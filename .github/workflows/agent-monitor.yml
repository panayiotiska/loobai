name: Loob monitor tick
on:
  schedule:
    # GitHub starves cron delivery for private free-plan repos: '*/30' fired
    # ~every 2h with 4h+ gaps. Dense schedule = more delivery attempts; the
    # concurrency group below prevents overlap when several land. Offset
    # minutes avoid the congested :00/:15/:30/:45 slots.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: loob-agent
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @loob/shared build && pnpm --filter @loob/db build && pnpm --filter @loob/agent-core build
      - run: pnpm --filter @loob/agent run monitor:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_WEB_URL: ${{ secrets.PUBLIC_WEB_URL }}
