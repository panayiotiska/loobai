name: Loob research tick
on:
  schedule:
    - cron: '15 */4 * * *'    # every 4 hours, 15min past the hour
  workflow_dispatch:
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: loob-agent
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @loob/shared build && pnpm --filter @loob/db build && pnpm --filter @loob/agent-core build
      - run: pnpm --filter @loob/agent run research:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_WEB_URL: ${{ secrets.PUBLIC_WEB_URL }}
