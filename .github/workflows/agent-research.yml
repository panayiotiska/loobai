name: Loob research tick
on:
  schedule:
    - cron: '23 */4 * * *'    # every 4 hours, at an uncommon minute (GitHub drops congested-minute schedules)
  workflow_dispatch:
jobs:
  research:
    runs-on: ubuntu-latest
    # Must stay BELOW the 65m failStaleRuns sweep threshold: a job killed at
    # this timeout leaves a zombie 'running' row, and the sweep must never
    # fire while a legitimate attempt could still be alive. Input-TPM pacing
    # (16k tokens/min free tier ≈ 1 request/min) makes a full 18-iteration
    # attempt ~20-25m; 55 covers setup + first attempt + 2m retry pause +
    # full second attempt.
    timeout-minutes: 55
    concurrency:
      group: loob-agent
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @loob/shared build && pnpm --filter @loob/db build && pnpm --filter @loob/agent-core build
      - run: pnpm --filter @loob/agent run research:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_WEB_URL: ${{ secrets.PUBLIC_WEB_URL }}
